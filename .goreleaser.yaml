# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: xhttp

before:
  hooks:
    - bash -c "cd cli && go mod tidy"

builds:
  - id: xhttp
    dir: cli
    main: .
    binary: xhttp
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

release:
  github:
    owner: yokedotlol
    name: xhttp
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: xhttp
    repository:
      owner: yokedotlol
      name: homebrew-tap
    directory: Formula
    homepage: https://xhttp.lol
    description: "HTTP response debugger — CORS, CSP, security headers, redirects, cache"
    license: MIT
    install: |
      bin.install "xhttp"
    test: |
      assert_match version.to_s, shell_output("#{bin}/xhttp version")
