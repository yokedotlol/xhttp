name = "xhttp-lol"
main = "src/worker.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

[vars]
PROBE_URL = "https://yoke-probe.fly.dev"

[[kv_namespaces]]
binding = "CACHE"
id = "99fb192bba6c448e937d2b439d02b41b"

[[routes]]
pattern = "xhttp.lol/*"
zone_name = "xhttp.lol"

[[routes]]
pattern = "xhttp.lol"
zone_name = "xhttp.lol"

[[routes]]
pattern = "mta-sts.xhttp.lol/*"
zone_name = "xhttp.lol"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterV2DO"

[[migrations]]
tag = "v1"
new_classes = ["RateLimiterDO"]

[[migrations]]
tag = "v2"
new_classes = ["RateLimiterV2DO"]

# Secrets (set via wrangler secret put):
# ADMIN_KEY - shared probe auth key
# SERVICE_KEY - shared key for .lol family service bindings

# ─── Optional service bindings ───
# These connect xhttp.lol to sibling .lol services for richer signals.
# Self-hosters: remove any bindings you don't have deployed —
# xhttp.lol falls back to its own checks automatically.

# Yoke domain intelligence (email auth + DNSSEC from yoke's cache)
[[services]]
binding = "YOKE"
service = "yoke"

[[migrations]]
tag = "v3"
deleted_classes = ["RateLimiterDO"]
